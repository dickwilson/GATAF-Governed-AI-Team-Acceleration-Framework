name: Protect Main Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  apply-ruleset:
    name: Apply branch protection ruleset
    runs-on: ubuntu-latest
    permissions:
      contents: read
      administration: write
    steps:
      - name: Create or update ruleset for main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # Check if a ruleset named "Protect main" already exists
          EXISTING=$(gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/repos/${REPO}/rulesets" \
            --jq '.[] | select(.name == "Protect main") | .id' 2>/dev/null || true)

          RULESET_JSON='{
            "name": "Protect main",
            "target": "branch",
            "enforcement": "active",
            "conditions": {
              "ref_name": {
                "include": ["refs/heads/main"],
                "exclude": []
              }
            },
            "rules": [
              { "type": "deletion" },
              { "type": "non_fast_forward" },
              {
                "type": "pull_request",
                "parameters": {
                  "required_approving_review_count": 1,
                  "dismiss_stale_reviews_on_push": true,
                  "require_code_owner_review": false,
                  "require_last_push_approval": false,
                  "required_review_thread_resolution": false
                }
              }
            ]
          }'

          if [ -n "$EXISTING" ]; then
            echo "Updating existing ruleset (id: $EXISTING)"
            echo "$RULESET_JSON" | gh api \
              --method PUT \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPO}/rulesets/${EXISTING}" \
              --input -
          else
            echo "Creating new ruleset"
            echo "$RULESET_JSON" | gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${REPO}/rulesets" \
              --input -
          fi

          echo "Ruleset applied successfully."
